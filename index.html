<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2048 Orb Wandering Prototype</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #0d0f14;
            color: #fff;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #hud {
            position: absolute;
            top: env(safe-area-inset-top, 16px);
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 16px;
            border-radius: 16px;
        }
        .score-container {
            display: flex;
            gap: 12px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8a99ad;
            margin-bottom: 2px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
        }
        .char-value-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .blue-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00d2ff;
            box-shadow: 0 0 10px #00d2ff;
        }
        #instruction {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom, 16px) + 16px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #65758c;
            pointer-events: none;
            text-align: center;
            width: 90%;
            letter-spacing: 0.5px;
            z-index: 10;
        }
        #restart-btn {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom, 16px) + 48px);
            right: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="glass-panel char-value-box">
            <div class="blue-indicator"></div>
            <div class="stat-box">
                <div class="stat-label">Your Orb</div>
                <div id="player-val" class="stat-value">2</div>
            </div>
        </div>
        <div class="score-container">
            <div class="glass-panel stat-box">
                <div class="stat-label">Score</div>
                <div id="score-val" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="instruction">Touch anywhere on the screen to deploy the floating joystick</div>
    
    <div id="restart-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
        </svg>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const playerValEl = document.getElementById('player-val');
        const scoreValEl = document.getElementById('score-val');
        const restartBtn = document.getElementById('restart-btn');

        let dpr = window.devicePixelRatio || 1;
        let width = window.innerWidth;
        let height = window.innerHeight;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        const COLORS = {
            2: { bg: '#1e293b', text: '#94a3b8', glow: 'transparent' },
            4: { bg: '#334155', text: '#cbd5e1', glow: 'transparent' },
            8: { bg: '#f97316', text: '#fff', glow: 'rgba(249, 115, 22, 0.3)' },
            16: { bg: '#ea580c', text: '#fff', glow: 'rgba(234, 88, 12, 0.4)' },
            32: { bg: '#ef4444', text: '#fff', glow: 'rgba(239, 68, 68, 0.4)' },
            64: { bg: '#dc2626', text: '#fff', glow: 'rgba(220, 38, 38, 0.5)' },
            128: { bg: '#eab308', text: '#fff', glow: 'rgba(234, 179, 8, 0.4)' },
            256: { bg: '#ca8a04', text: '#fff', glow: 'rgba(202, 138, 4, 0.5)' },
            512: { bg: '#22c55e', text: '#fff', glow: 'rgba(34, 197, 94, 0.5)' },
            1024: { bg: '#a855f7', text: '#fff', glow: 'rgba(168, 85, 247, 0.6)' },
            2048: { bg: '#ec4899', text: '#fff', glow: 'rgba(236, 72, 153, 0.8)' }
        };

        const BLUE_PLAYER_THEME = {
            bg: '#00d2ff', text: '#ffffff', glow: '#00d2ff', stroke: '#0072ff'
        };

        let score = 0;
        let screenShake = 0;

        // True Floating Joystick Configuration
        const joystick = {
            startX: 0, startY: 0,
            curX: 0, curY: 0,
            active: false,
            identifier: null,
            maxRadius: 50,
            vx: 0, vy: 0
        };

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.radius = Math.random() * 3 + 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.015;
                this.color = color;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        class Orb {
            constructor(x, y, value = 2, isPlayer = false) {
                this.x = x;
                this.y = y;
                this.value = value;
                this.isPlayer = isPlayer;
                this.baseRadius = 24;
                this.radius = this.calculateRadius();
                this.targetRadius = this.radius;
                this.vx = isPlayer ? 0 : (Math.random() - 0.5) * 1.5;
                this.vy = isPlayer ? 0 : (Math.random() - 0.5) * 1.5;
                this.toDestroy = false;
                this.eyeSquint = 0;
                this.lookAngle = 0;
            }

            calculateRadius() {
                return this.baseRadius + Math.log2(this.value) * 3.5;
            }

            update() {
                if (Math.abs(this.radius - this.targetRadius) > 0.1) {
                    this.radius += (this.targetRadius - this.radius) * 0.1;
                }

                if (this.isPlayer) {
                    if (joystick.active) {
                        this.vx = joystick.vx * 5.5;
                        this.vy = joystick.vy * 5.5;
                        this.lookAngle = Math.atan2(joystick.vy, joystick.vx);
                    } else {
                        this.vx *= 0.85;
                        this.vy *= 0.85;
                    }

                    this.x += this.vx;
                    this.y += this.vy;

                    if (this.eyeSquint > 0) this.eyeSquint -= 0.05;
                } else {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx += (Math.random() - 0.5) * 0.15;
                    this.vy += (Math.random() - 0.5) * 0.15;

                    const speed = Math.hypot(this.vx, this.vy);
                    const maxSpeed = 1.6;
                    if (speed > maxSpeed) {
                        this.vx = (this.vx / speed) * maxSpeed;
                        this.vy = (this.vy / speed) * maxSpeed;
                    }
                }

                const r = this.radius;
                if (this.x - r < 0) { this.x = r; this.vx *= -1; }
                if (this.x + r > width) { this.x = width - r; this.vx *= -1; }
                if (this.y - r < 0) { this.y = r; this.vy *= -1; }
                if (this.y + r > height) { this.y = height - r; this.vy *= -1; }
            }

            draw() {
                ctx.save();
                let theme = COLORS[this.value] || COLORS[2048];
                if (this.isPlayer) theme = BLUE_PLAYER_THEME;

                if (theme.glow !== 'transparent') {
                    ctx.shadowBlur = this.isPlayer ? 24 : 14;
                    ctx.shadowColor = theme.glow;
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = theme.bg;
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = this.isPlayer ? theme.stroke : 'rgba(255,255,255,0.15)';
                ctx.lineWidth = this.isPlayer ? 4 : 2;
                ctx.stroke();

                if (this.isPlayer) {
                    ctx.fillStyle = '#1e293b';
                    const lookDist = this.radius * 0.25;
                    const eyeOffsetX = Math.cos(this.lookAngle) * lookDist;
                    const eyeOffsetY = Math.sin(this.lookAngle) * lookDist;
                    
                    const eyeSpacing = this.radius * 0.35;
                    const leftEyeX = this.x + eyeOffsetX - Math.sin(this.lookAngle) * eyeSpacing;
                    const leftEyeY = this.y + eyeOffsetY + Math.cos(this.lookAngle) * eyeSpacing;
                    const rightEyeX = this.x + eyeOffsetX + Math.sin(this.lookAngle) * eyeSpacing;
                    const rightEyeY = this.y + eyeOffsetY - Math.cos(this.lookAngle) * eyeSpacing;

                    const normalEyeRadius = this.radius * 0.14;

                    if (this.eyeSquint > 0.1) {
                        ctx.strokeStyle = '#1e293b';
                        ctx.lineWidth = 3;
                        ctx.lineCap = 'round';
                        ctx.beginPath(); ctx.arc(leftEyeX, leftEyeY, normalEyeRadius, Math.PI, 0, false); ctx.stroke();
                        ctx.beginPath(); ctx.arc(rightEyeX, rightEyeY, normalEyeRadius, Math.PI, 0, false); ctx.stroke();
                    } else {
                        ctx.beginPath(); ctx.arc(leftEyeX, leftEyeY, normalEyeRadius, 0, Math.PI * 2); ctx.arc(rightEyeX, rightEyeY, normalEyeRadius, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath(); ctx.arc(leftEyeX - normalEyeRadius * 0.3, leftEyeY - normalEyeRadius * 0.3, normalEyeRadius * 0.35, 0, Math.PI * 2); ctx.beginPath(); ctx.arc(rightEyeX - normalEyeRadius * 0.3, rightEyeY - normalEyeRadius * 0.3, normalEyeRadius * 0.35, 0, Math.PI * 2); ctx.fill();
                    }

                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${this.radius * 0.45}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.value, this.x, this.y + this.radius * 0.45);
                } else {
                    ctx.fillStyle = theme.text;
                    ctx.font = `bold ${this.radius * 0.5}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.value, this.x, this.y);
                }
                ctx.restore();
            }
        }

        let player = null;
        let orbs = [];
        let particles = [];

        function init() {
            score = 0;
            scoreValEl.textContent = score;
            orbs = [];
            particles = [];
            
            player = new Orb(width / 2, height / 2, 2, true);
            playerValEl.textContent = player.value;

            const initialCount = Math.min(18, Math.floor((width * height) / 35000));
            for (let i = 0; i < initialCount; i++) {
                spawnOrb();
            }
        }

        function spawnOrb() {
            const margin = 80;
            const rx = Math.random() * (width - margin * 2) + margin;
            const ry = Math.random() * (height - margin * 2) + margin;
            
            if (player && Math.hypot(rx - player.x, ry - player.y) < 150) return;

            let spawnVal = Math.random() > 0.55 ? 4 : 2;
            if (player && player.value > 4 && Math.random() > 0.8) {
                spawnVal = Math.pow(2, Math.floor(Math.random() * (Math.log2(player.value) - 1)) + 1);
            }
            orbs.push(new Orb(rx, ry, spawnVal));
        }

        // --- Global Floating Joystick Touch Controls ---
        window.addEventListener('touchstart', (e) => {
            // Drop restriction on screen halves—any touch activates the center base coordinate right there
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                
                // Ignore touches targeting UI panels directly
                if (t.clientY < 80 || (t.clientX > width - 70 && t.clientY > height - 100)) continue;

                if (!joystick.active) {
                    joystick.active = true;
                    joystick.identifier = t.identifier;
                    joystick.startX = t.clientX;
                    joystick.startY = t.clientY;
                    joystick.curX = t.clientX;
                    joystick.curY = t.clientY;
                    joystick.vx = 0;
                    joystick.vy = 0;
                    break;
                }
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            for (let i = 0; i < e.touches.length; i++) {
                const t = e.touches[i];
                if (t.identifier === joystick.identifier) {
                    joystick.curX = t.clientX;
                    joystick.curY = t.clientY;

                    const dx = joystick.curX - joystick.startX;
                    const dy = joystick.curY - joystick.startY;
                    const dist = Math.hypot(dx, dy);

                    if (dist > joystick.maxRadius) {
                        joystick.vx = dx / dist;
                        joystick.vy = dy / dist;
                        joystick.curX = joystick.startX + joystick.vx * joystick.maxRadius;
                        joystick.curY = joystick.startY + joystick.vy * joystick.maxRadius;
                    } else {
                        joystick.vx = dx / joystick.maxRadius;
                        joystick.vy = dy / joystick.maxRadius;
                    }
                }
            }
        }, { passive: true });

        const endTouch = (e) => {
            if (!joystick.active) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joystick.identifier) {
                    joystick.active = false;
                    joystick.identifier = null;
                    joystick.vx = 0;
                    joystick.vy = 0;
                }
            }
        };
        window.addEventListener('touchend', endTouch);
        window.addEventListener('touchcancel', endTouch);

        // Mouse Support
        window.addEventListener('mousedown', (e) => {
            if (e.clientY < 80) return;
            if (!joystick.active) {
                joystick.active = true;
                joystick.startX = e.clientX;
                joystick.startY = e.clientY;
                joystick.curX = e.clientX;
                joystick.curY = e.clientY;
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (!joystick.active) return;
            const dx = e.clientX - joystick.startX;
            const dy = e.clientY - joystick.startY;
            const dist = Math.hypot(dx, dy);
            if (dist > joystick.maxRadius) {
                joystick.vx = dx / dist;
                joystick.vy = dy / dist;
                joystick.curX = joystick.startX + joystick.vx * joystick.maxRadius;
                joystick.curY = joystick.startY + joystick.vy * joystick.maxRadius;
            } else {
                joystick.vx = dx / joystick.maxRadius;
                joystick.vy = dy / joystick.maxRadius;
            }
        });
        window.addEventListener('mouseup', () => {
            joystick.active = false;
            joystick.vx = 0;
            joystick.vy = 0;
        });

        restartBtn.addEventListener('click', init);

        function drawJoystick() {
            if (!joystick.active) return;
            ctx.save();
            
            // Outer Ring
            ctx.beginPath();
            ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Inner Knob
            ctx.beginPath();
            ctx.arc(joystick.curX, joystick.curY, 20, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 210, 255, 0.7)';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00d2ff';
            ctx.fill();
            
            ctx.restore();
        }

        function handleCollisions() {
            const allOrbs = [player, ...orbs];
            for (let i = 0; i < allOrbs.length; i++) {
                for (let j = i + 1; j < allOrbs.length; j++) {
                    const o1 = allOrbs[i];
                    const o2 = allOrbs[j];
                    if (o1.toDestroy || o2.toDestroy) continue;

                    const dx = o2.x - o1.x;
                    const dy = o2.y - o1.y;
                    const distance = Math.hypot(dx, dy);
                    const minDist = o1.radius + o2.radius;

                    if (distance < minDist) {
                        if (o1.value === o2.value) {
                            const survivor = o1.isPlayer ? o1 : o2;
                            const consumed = o1.isPlayer ? o2 : o1;

                            survivor.value *= 2;
                            survivor.targetRadius = survivor.calculateRadius();
                            consumed.toDestroy = true;

                            if (survivor.isPlayer) {
                                survivor.eyeSquint = 1.0;
                                score += survivor.value;
                                scoreValEl.textContent = score;
                                playerValEl.textContent = survivor.value;
                                screenShake = 8;
                            }

                            const color = survivor.isPlayer ? BLUE_PLAYER_THEME.bg : (COLORS[survivor.value]?.bg || '#ff00d0');
                            for (let p = 0; p < 18; p++) {
                                particles.push(new Particle(consumed.x, consumed.y, color));
                            }
                        } else {
                            const nx = dx / distance;
                            const ny = dy / distance;
                            const kx = o1.vx - o2.vx;
                            const ky = o1.vy - o2.vy;
                            const impulse = 2 * (nx * kx + ny * ky) / 2;

                            if (!o1.isPlayer) { o1.vx -= impulse * nx; o1.vy -= impulse * ny; }
                            if (!o2.isPlayer) { o2.vx += impulse * nx; o2.vy += impulse * ny; }

                            const overlap = minDist - distance;
                            if (!o1.isPlayer && !o2.isPlayer) {
                                o1.x -= nx * overlap * 0.5; o1.y -= ny * overlap * 0.5;
                                o2.x += nx * overlap * 0.5; o2.y += ny * overlap * 0.5;
                            } else if (o1.isPlayer) {
                                o2.x += nx * overlap; o2.y += ny * overlap;
                            } else {
                                o1.x -= nx * overlap; o1.y -= ny * overlap;
                            }
                        }
                    }
                }
            }
        }

        let lastSpawn = 0;
        function updateSpawning(timestamp) {
            if (timestamp - lastSpawn > 1800) {
                if (orbs.length < 22) spawnOrb();
                lastSpawn = timestamp;
            }
        }

        function loop(timestamp) {
            ctx.save();
            if (screenShake > 0.1) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                screenShake *= 0.9;
            }

            ctx.clearRect(0, 0, width, height);
            updateSpawning(timestamp);
            handleCollisions();

            player.update();
            player.draw();

            for (let i = orbs.length - 1; i >= 0; i--) {
                if (orbs[i].toDestroy) { orbs.splice(i, 1); continue; }
                orbs[i].update();
                orbs[i].draw();
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            drawJoystick();

            ctx.restore();
            requestAnimationFrame(loop);
        }

        init();
        requestAnimationFrame((t) => loop(t));
    </script>
</body>
</html>
