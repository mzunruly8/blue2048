    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2048 Orb Wandering Prototype</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #0d0f14;
            color: #fff;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        /* Mobile-friendly HUD Overlay */
        #hud {
            position: absolute;
            top: env(safe-area-inset-top, 16px);

</head>
<body>
    <div id="hud">
        <div class="glass-panel char-value-box">
            <div class="blue-indicator"></div>
            <div class="stat-box">
                <div class="stat-label">Your Orb</div>
                <div id="player-val" class="stat-value">2</div>
            </div>
        </div>
        <div class="score-container">
            <div class="glass-panel stat-box">
                <div class="stat-label">Score</div>
                <div id="score-val" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="instruction">Drag or Tap anywhere to guide your Blue Character</div>
    
    <div id="restart-btn" id="restart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
        </svg>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const playerValEl = document.getElementById('player-val');
        const scoreValEl = document.getElementById('score-val');
        const restartBtn = document.getElementById('restart-btn');

        // High DPI Support
        let dpr = window.devicePixelRatio || 1;
        let width = window.innerWidth;
        let height = window.innerHeight;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        // Color theme mapping
        const COLORS = {
            2: { bg: '#1e293b', text: '#94a3b8', glow: 'transparent' },
            4: { bg: '#334155', text: '#cbd5e1', glow: 'transparent' },
            8: { bg: '#f97316', text: '#fff', glow: 'rgba(249, 115, 22, 0.3)' },
            16: { bg: '#ea580c', text: '#fff', glow: 'rgba(234, 88, 12, 0.4)' },
            32: { bg: '#ef4444', text: '#fff', glow: 'rgba(239, 68, 68, 0.4)' },
            64: { bg: '#dc2626', text: '#fff', glow: 'rgba(220, 38, 38, 0.5)' },
            128: { bg: '#eab308', text: '#fff', glow: 'rgba(234, 179, 8, 0.4)' },
            256: { bg: '#ca8a04', text: '#fff', glow: 'rgba(202, 138, 4, 0.5)' },
            512: { bg: '#22c55e', text: '#fff', glow: 'rgba(34, 197, 94, 0.5)' },
            1024: { bg: '#a855f7', text: '#fff', glow: 'rgba(168, 85, 247, 0.6)' },
            2048: { bg: '#ec4899', text: '#fff', glow: 'rgba(236, 72, 153, 0.8)' }
        };

        const BLUE_PLAYER_THEME = {
            bg: '#00d2ff',
            text: '#ffffff',
            glow: '#00d2ff',
            stroke: '#0072ff'
        };

        let score = 0;
        let screenShake = 0;

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.radius = Math.random() * 3 + 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.015;
                this.color = color;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        class Orb {
            constructor(x, y, value = 2, isPlayer = false) {
                this.x = x;
                this.y = y;
                this.value = value;
                this.isPlayer = isPlayer;
                this.baseRadius = 24;
                this.radius = this.calculateRadius();
                this.targetRadius = this.radius;
                
                // Physics properties
                this.vx = isPlayer ? 0 : (Math.random() - 0.5) * 1.5;
                this.vy = isPlayer ? 0 : (Math.random() - 0.5) * 1.5;
                this.toDestroy = false;

                // Visual attributes for the Blue Character
                this.eyeSquint = 0; // Squint animation when merging
                this.lookAngle = 0;
            }

            calculateRadius() {
                return this.baseRadius + Math.log2(this.value) * 3.5;
            }

            update(targetX, targetY) {
                // Smooth radius scale transition
                if (Math.abs(this.radius - this.targetRadius) > 0.1) {
                    this.radius += (this.targetRadius - this.radius) * 0.1;
                }

                if (this.isPlayer) {
                    // Smooth tracking toward touch/drag coordinates
                    const dx = targetX - this.x;
                    const dy = targetY - this.y;
                    const distance = Math.hypot(dx, dy);
                    
                    if (distance > 2) {
                        this.vx = dx * 0.12;
                        this.vy = dy * 0.12;
                        this.lookAngle = Math.atan2(dy, dx);
                    } else {
                        this.vx *= 0.5;
                        this.vy *= 0.5;
                    }

                    this.x += this.vx;
                    this.y += this.vy;

                    // Decelerate squint eyes back to normal
                    if (this.eyeSquint > 0) {
                        this.eyeSquint -= 0.05;
                    }
                } else {
                    // Passive wander behavior for non-player AI orbs
                    this.x += this.vx;
                    this.y += this.vy;

                    this.vx += (Math.random() - 0.5) * 0.15;
                    this.vy += (Math.random() - 0.5) * 0.15;

                    // Cap maximum drift velocity
                    const speed = Math.hypot(this.vx, this.vy);
                    const maxSpeed = 1.6;
                    if (speed > maxSpeed) {
                        this.vx = (this.vx / speed) * maxSpeed;
                        this.vy = (this.vy / speed) * maxSpeed;
                    }
                }

                // Wall bounds handling
                const r = this.radius;
                if (this.x - r < 0) { this.x = r; this.vx *= -1; }
                if (this.x + r > width) { this.x = width - r; this.vx *= -1; }
                if (this.y - r < 0) { this.y = r; this.vy *= -1; }
                if (this.y + r > height) { this.y = height - r; this.vy *= -1; }
            }

            draw() {
                ctx.save();
                
                let theme = COLORS[this.value] || COLORS[2048];
                if (this.isPlayer) {
                    theme = BLUE_PLAYER_THEME;
                }

                // Draw outer glow shadow
                if (theme.glow !== 'transparent') {
                    ctx.shadowBlur = this.isPlayer ? 24 : 14;
                    ctx.shadowColor = theme.glow;
                }

                // Main body
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = theme.bg;
                ctx.fill();

                // Draw strokes
                ctx.shadowBlur = 0; // Reset shadow for stroke
                ctx.strokeStyle = this.isPlayer ? theme.stroke : 'rgba(255,255,255,0.15)';
                ctx.lineWidth = this.isPlayer ? 4 : 2;
                ctx.stroke();

                if (this.isPlayer) {
                    // Draw face and expressive eyes for the Blue Character
                    ctx.fillStyle = '#1e293b';
                    
                    // Offset look position based on lookAngle
                    const lookDist = this.radius * 0.25;
                    const eyeOffsetX = Math.cos(this.lookAngle) * lookDist;
                    const eyeOffsetY = Math.sin(this.lookAngle) * lookDist;
                    
                    const eyeSpacing = this.radius * 0.35;
                    const leftEyeX = this.x + eyeOffsetX - Math.sin(this.lookAngle) * eyeSpacing;
                    const leftEyeY = this.y + eyeOffsetY + Math.cos(this.lookAngle) * eyeSpacing;
                    const rightEyeX = this.x + eyeOffsetX + Math.sin(this.lookAngle) * eyeSpacing;
                    const rightEyeY = this.y + eyeOffsetY - Math.cos(this.lookAngle) * eyeSpacing;

                    const normalEyeRadius = this.radius * 0.14;

                    // Happy squinting curves or normal circles
                    if (this.eyeSquint > 0.1) {
                        ctx.strokeStyle = '#1e293b';
                        ctx.lineWidth = 3;
                        ctx.lineCap = 'round';
                        
                        // Squinted Eye arcs
                        ctx.beginPath();
                        ctx.arc(leftEyeX, leftEyeY, normalEyeRadius, Math.PI, 0, false);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(rightEyeX, rightEyeY, normalEyeRadius, Math.PI, 0, false);
                        ctx.stroke();
                    } else {
                        // Normal round eyes
                        ctx.beginPath();
                        ctx.arc(leftEyeX, leftEyeY, normalEyeRadius, 0, Math.PI * 2);
                        ctx.arc(rightEyeX, rightEyeY, normalEyeRadius, 0, Math.PI * 2);
                        ctx.fill();

                        // Cute white eye shines
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(leftEyeX - normalEyeRadius * 0.3, leftEyeY - normalEyeRadius * 0.3, normalEyeRadius * 0.35, 0, Math.PI * 2);
                        ctx.arc(rightEyeX - normalEyeRadius * 0.3, rightEyeY - normalEyeRadius * 0.3, normalEyeRadius * 0.35, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Value label on player
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${this.radius * 0.45}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.value, this.x, this.y + this.radius * 0.45);

                } else {
                    // Standard wandering orb value label
                    ctx.fillStyle = theme.text;
                    ctx.font = `bold ${this.radius * 0.5}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.value, this.x, this.y);
                }

                ctx.restore();
            }
        }

        // Initialize state
        let player = null;
        let orbs = [];
        let particles = [];
        let pointer = { x: 0, y: 0, active: false };

        function init() {
            score = 0;
            scoreValEl.textContent = score;
            orbs = [];
            particles = [];
            
            // Player starts in the center
            player = new Orb(width / 2, height / 2, 2, true);
            playerValEl.textContent = player.value;
            
            pointer.x = width / 2;
            pointer.y = height / 2;
            pointer.active = false;

            // Spawn dynamic wandering AI population
            const initialCount = Math.min(18, Math.floor((width * height) / 35000));
            for (let i = 0; i < initialCount; i++) {
                spawnOrb();
            }
        }

        function spawnOrb() {
            const margin = 80;
            const rx = Math.random() * (width - margin * 2) + margin;
            const ry = Math.random() * (height - margin * 2) + margin;
            
            // Ensure we don't spawn right on top of player
            if (player && Math.hypot(rx - player.x, ry - player.y) < 150) {
                return; 
            }

            // Spawn values weighted towards 2 and 4, occasionally match player size
            let spawnVal = Math.random() > 0.55 ? 4 : 2;
            
            // Allow matching player's current size as game scales up
            if (player && player.value > 4 && Math.random() > 0.8) {
                // Spawn values up to half of player value to maintain a progressive match loop
                spawnVal = Math.pow(2, Math.floor(Math.random() * (Math.log2(player.value) - 1)) + 1);
            }

            orbs.push(new Orb(rx, ry, spawnVal));
        }

        // Touch and mouse controls
        function updatePointer(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            pointer.x = clientX;
            pointer.y = clientY;
            pointer.active = true;
        }

        window.addEventListener('touchstart', (e) => {
            updatePointer(e);
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            updatePointer(e);
        }, { passive: true });

        window.addEventListener('touchend', () => { pointer.active = false; });

        window.addEventListener('mousedown', (e) => {
            updatePointer(e);
        });

        window.addEventListener('mousemove', (e) => {
            if (pointer.active) updatePointer(e);
        });

        window.addEventListener('mouseup', () => { pointer.active = false; });

        restartBtn.addEventListener('click', init);

        function handleCollisions() {
            // Compare all elements including player
            const allOrbs = [player, ...orbs];

            for (let i = 0; i < allOrbs.length; i++) {
                for (let j = i + 1; j < allOrbs.length; j++) {
                    const o1 = allOrbs[i];
                    const o2 = allOrbs[j];
                    if (o1.toDestroy || o2.toDestroy) continue;

                    const dx = o2.x - o1.x;
                    const dy = o2.y - o1.y;
                    const distance = Math.hypot(dx, dy);
                    const minDist = o1.radius + o2.radius;

                    if (distance < minDist) {
                        // Merge Condition: same value
                        if (o1.value === o2.value) {
                            const survivor = o1.isPlayer ? o1 : o2;
                            const consumed = o1.isPlayer ? o2 : o1;

                            survivor.value *= 2;
                            survivor.targetRadius = survivor.calculateRadius();
                            consumed.toDestroy = true;

                            // Triggers squint/happy eyes if player merged
                            if (survivor.isPlayer) {
                                survivor.eyeSquint = 1.0;
                                score += survivor.value;
                                scoreValEl.textContent = score;
                                playerValEl.textContent = survivor.value;
                                screenShake = 8;
                            }

                            // Trigger beautiful merge burst particles
                            const color = survivor.isPlayer ? BLUE_PLAYER_THEME.bg : (COLORS[survivor.value]?.bg || '#ff00d0');
                            for (let p = 0; p < 18; p++) {
                                particles.push(new Particle(consumed.x, consumed.y, color));
                            }
                        } else {
                            // Standard elastic physical bounce for disparate values
                            const nx = dx / distance;
                            const ny = dy / distance;
                            
                            // Relative velocity
                            const kx = o1.vx - o2.vx;
                            const ky = o1.vy - o2.vy;
                            const impulse = 2 * (nx * kx + ny * ky) / 2;

                            if (!o1.isPlayer) {
                                o1.vx -= impulse * nx;
                                o1.vy -= impulse * ny;
                            }
                            if (!o2.isPlayer) {
                                o2.vx += impulse * nx;
                                o2.vy += impulse * ny;
                            }

                            // Push them out to prevent sticking
                            const overlap = minDist - distance;
                            if (!o1.isPlayer && !o2.isPlayer) {
                                o1.x -= nx * overlap * 0.5;
                                o1.y -= ny * overlap * 0.5;
                                o2.x += nx * overlap * 0.5;
                                o2.y += ny * overlap * 0.5;
                            } else if (o1.isPlayer) {
                                o2.x += nx * overlap;
                                o2.y += ny * overlap;
                            } else {
                                o1.x -= nx * overlap;
                                o1.y -= ny * overlap;
                            }
                        }
                    }
                }
            }
        }

        // Continuous Spawner
        let lastSpawn = 0;
        function updateSpawning(timestamp) {
            if (timestamp - lastSpawn > 1800) {
                if (orbs.length < 22) {
                    spawnOrb();
                }
                lastSpawn = timestamp;
            }
        }

        // Main game loop
        function loop(timestamp) {
            ctx.save();
            
            // Screen shake handler
            if (screenShake > 0.1) {
                const dx = (Math.random() - 0.5) * screenShake;
                const dy = (Math.random() - 0.5) * screenShake;
                ctx.translate(dx, dy);
                screenShake *= 0.9;
            }

            ctx.clearRect(0, 0, width, height);

            // Update Spawns
            updateSpawning(timestamp);

            // Handle Interactions
            handleCollisions();

            // Render & Update Player Character
            // On mobile, if user isn't touching, let player drift smoothly
            const targetX = pointer.active ? pointer.x : player.x;
            const targetY = pointer.active ? pointer.y : player.y;
            player.update(targetX, targetY);
            player.draw();

            // Render & Update AI Orbs
            for (let i = orbs.length - 1; i >= 0; i--) {
                const orb = orbs[i];
                if (orb.toDestroy) {
                    orbs.splice(i, 1);
                    continue;
                }
                orb.update();
                orb.draw();
            }

            // Render & Update Burst Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            ctx.restore();
            requestAnimationFrame(loop);
        }

        // Run
        init();
        requestAnimationFrame((t) => loop(t));
    </script>
</body>
</html>
